<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Stackly</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===============================
   ROOT VARIABLES (MATCH INDEX)
=================================*/
:root{
--primary:#ff2b5f;
--primary-dark:#ff0033;
--dark:#ffffff;
--gray:#aaa;
--bg:#0a0a0a;
--card:#111111;
}

/* ===============================
   GLOBAL
=================================*/
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    transition:all .3s ease;
}

body{
background:#0a0a0a;
color:#fff;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* ===============================
   PRELOADER (MATCH INDEX)
=================================*/
#preloader{
    position:fixed;
    width:100%;
    height:100vh;
    background:#0a0a0a;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.loader-logo{
width:120px;
animation:spinLogo 2s ease-in-out infinite;
filter:drop-shadow(0 0 15px rgba(255,43,95,.6));
}

@keyframes spinLogo{
    0%{ transform:scale(0.8) rotate(0deg); opacity:0.5; }
    50%{ transform:scale(1.1) rotate(180deg); opacity:1; }
    100%{ transform:scale(0.8) rotate(360deg); opacity:0.5; }
}

/* ===============================
   AUTH CARD
=================================*/
.auth-card{
background:#111;
padding:40px;
width:100%;
max-width:420px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.05);
}

/* Logo */
.auth-logo{
    text-align:center;
    margin-bottom:20px;
}

.auth-logo img{
    height:55px;
}

/* Heading */
.auth-card h2{
    text-align:center;
    margin-bottom:30px;
    color:#ff2b5f;
}

/* Inputs */
.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
}

.input-group input{
width:100%;
padding:12px 15px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
background:#0a0a0a;
color:#fff;
outline:none;
height:45px;
}

.input-group input:focus{
border-color:#ff2b5f;
}

/* Forgot */
.forgot-pass-wrapper{
    text-align:right;
    margin-top:-15px;
    margin-bottom:20px;
}

.forgot-pass-link{
    font-size:12px;
    color:var(--gray);
    text-decoration:none;
}

.forgot-pass-link:hover{
    color:var(--primary);
}

/* Button */
.btn-primary{
width:100%;
padding:12px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#ff0033,#ff2b5f);
color:white;
font-weight:600;
cursor:pointer;
box-shadow:0 6px 14px rgba(255,0,80,.35);
}

.btn-primary:hover{
transform:translateY(-3px);
box-shadow:0 10px 24px rgba(255,0,80,.45);
}

/* Bottom Link */
.auth-link{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.auth-link a{
    color:#ff2b5f;
    font-weight:600;
    text-decoration:none;
}

/* Password eye */
.password-wrapper{
    position:relative;
}

.password-wrapper input{
    padding-right:45px;
}

.password-wrapper span{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:18px;
}

.error{
    color:var(--primary);
    font-size:12px;
    margin-top:5px;
    display:none;
}

/* Responsive */
@media(max-width:480px){
    .auth-card{
        padding:30px;
    }
}

</style>
</head>

<body>

<!-- PRELOADER -->
<div id="preloader">
    <img src="assets/images/logo/stackly_logo.webp" class="loader-logo">
</div>

<!-- THEME TOGGLE -->

<div class="auth-card">

<div class="auth-logo">
    <a href="index.html">
        <img src="assets/images/logo/stackly_logo.webp" alt="Stackly Logo">
    </a>
</div>

<h2>Login to Stackly</h2>

<form id="loginForm">

<div class="input-group">
<label>Email</label>
<input type="email" id="email">
<p id="emailError" class="error">Invalid email format</p>
</div>

<div class="input-group">
<label>Password</label>
<div class="password-wrapper">
<input type="password" id="password">
<span id="togglePass">👁</span>
</div>
<p id="passError" class="error">
8+ chars with upper, lower, number & special char
</p>
</div>

<div class="forgot-pass-wrapper">
<a href="404.html" class="forgot-pass-link">Forgot Password?</a>
</div>

<button type="submit" class="btn-primary">Login</button>

<div class="auth-link">
Don't have an account?
<a href="register.html">Register</a>
</div>

</form>
</div>

<script>

/* ===============================
   PRELOADER
=================================*/
window.addEventListener("load",function(){
    setTimeout(function(){
        document.getElementById("preloader").style.display="none";
    },2000);
});

/* ===============================
   FORM VALIDATION
=================================*/
const emailError=document.getElementById("emailError");
const passError=document.getElementById("passError");
const email=document.getElementById("email");
const password=document.getElementById("password");

document.getElementById("togglePass").onclick=()=>{
password.type=password.type==="password"?"text":"password";
};

const emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
const passPattern=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

document.getElementById("loginForm").addEventListener("submit",(e)=>{
e.preventDefault();
let valid=true;

if(!emailPattern.test(email.value)){
emailError.style.display="block";
valid=false;
}else{
emailError.style.display="none";
}

if(!passPattern.test(password.value)){
passError.style.display="block";
valid=false;
}else{
passError.style.display="none";
}

if(valid){
window.location.href="404.html";
}
});
</script>

</body>
</html>
